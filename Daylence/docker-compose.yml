version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: daylence-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: daylence
      POSTGRES_USER: daylence
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daylence_dev_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daylence"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
